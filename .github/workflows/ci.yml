name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Linting and Code Quality
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy pylint bandit
      
      - name: Run Black (Code Formatter Check)
        run: black --check --diff .
      
      - name: Run isort (Import Sorting Check)
        run: isort --check-only --diff .
      
      - name: Run Flake8 (Style Guide Enforcement)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Run MyPy (Type Checking)
        run: mypy . --ignore-missing-imports || true
      
      - name: Run Pylint (Code Analysis)
        run: pylint **/*.py || true

  # Unit Testing and Coverage
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11, 3.12]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock coverage
      
      - name: Create test database config
        run: |
          mkdir -p tests
          cat > tests/test_config.py << 'EOF'
          import os
          
          TEST_DB_CONFIG = {
              'host': 'localhost',
              'port': 5432,
              'database': 'test_db',
              'user': 'postgres',
              'password': 'postgres'
          }
          EOF
      
      - name: Run tests with coverage
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        run: |
          pytest --cov=. --cov-report=xml --cov-report=html --cov-report=term-missing
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # Security Scanning
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install security scanning tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety semgrep
          pip install -r requirements.txt
      
      - name: Run Bandit (Security Linter)
        run: |
          bandit -r . -f json -o bandit-report.json || true
          bandit -r . || true
      
      - name: Run Safety (Dependency Vulnerability Check)
        run: safety check --json --output safety-report.json || true
      
      - name: Run Semgrep (Static Analysis)
        run: |
          python -m semgrep --config=auto --json --output=semgrep-report.json . || true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
            semgrep-report.json

  # Documentation Building
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install sphinx sphinx-rtd-theme sphinx-autodoc-typehints
      
      - name: Create Sphinx documentation structure
        run: |
          mkdir -p docs
          cat > docs/conf.py << 'EOF'
          import os
          import sys
          sys.path.insert(0, os.path.abspath('..'))
          
          project = 'DB Operations Utility'
          copyright = '2024, CB Winslow'
          author = 'CB Winslow'
          
          extensions = [
              'sphinx.ext.autodoc',
              'sphinx.ext.viewcode',
              'sphinx.ext.napoleon',
              'sphinx_autodoc_typehints'
          ]
          
          templates_path = ['_templates']
          exclude_patterns = ['_build', 'Thumbs.db', '.DS_Store']
          
          html_theme = 'sphinx_rtd_theme'
          html_static_path = ['_static']
          EOF
          
          cat > docs/index.rst << 'EOF'
          DB Operations Utility Documentation
          ==================================
          
          .. toctree::
             :maxdepth: 2
             :caption: Contents:
          
             modules
          
          Indices and tables
          ==================
          
          * :ref:`genindex`
          * :ref:`modindex`
          * :ref:`search`
          EOF
      
      - name: Generate API documentation
        run: |
          cd docs
          sphinx-apidoc -o . .. --force --separate
      
      - name: Build documentation
        run: |
          cd docs
          sphinx-build -b html . _build/html
      
      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/_build/html/

  # Deployment (if all tests pass)
  deploy:
    name: Deploy
    needs: [lint, test, security, docs]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      
      - name: Build package
        run: |
          # Create setup.py if it doesn't exist
          if [ ! -f setup.py ]; then
            cat > setup.py << 'EOF'
          from setuptools import setup, find_packages
          
          with open("README.md", "r", encoding="utf-8") as fh:
              long_description = fh.read()
          
          setup(
              name="db-operations-utility",
              version="0.1.0",
              author="CB Winslow",
              author_email="blaine.winslow@gmail.com",
              description="A comprehensive database operations utility for PostgreSQL",
              long_description=long_description,
              long_description_content_type="text/markdown",
              packages=find_packages(),
              classifiers=[
                  "Development Status :: 3 - Alpha",
                  "Intended Audience :: Developers",
                  "License :: OSI Approved :: MIT License",
                  "Operating System :: OS Independent",
                  "Programming Language :: Python :: 3",
                  "Programming Language :: Python :: 3.9",
                  "Programming Language :: Python :: 3.10",
                  "Programming Language :: Python :: 3.11",
                  "Programming Language :: Python :: 3.12",
              ],
              python_requires=">=3.9",
              install_requires=[
                  "psycopg2-binary>=2.9.10",
                  "SQLAlchemy>=2.0.41",
              ],
          )
          EOF
          fi
          python -m build
      
      - name: Check package
        run: twine check dist/*
      
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Automated release from CI/CD pipeline
            
            Changes in this release:
            - Latest commits from main branch
          draft: false
          prerelease: false

